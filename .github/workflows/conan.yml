name: conan

on:
  push:
    paths:
      - 'pkg/conan/**'
      - 'single_include/**'
      - 'LICENSE'
      - '.github/workflows/conan.yml'
  pull_request:
    paths:
      - 'pkg/conan/**'
      - 'single_include/**'
      - 'LICENSE'
      - '.github/workflows/conan.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-windows:
    timeout-minutes: 5
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Conan
        run: |
          python -m pip install --upgrade pip
          python -m pip install "conan>=2,<3"

      - name: Detect Conan profile
        run: |
          conan profile detect --force

      - name: Create package
        run: |
          conan create pkg/conan --build=missing -s build_type=${{ matrix.build_type }} -s compiler.cppstd=17
